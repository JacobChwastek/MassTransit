name: MassTransit

env:
  MASSTRANSIT_VERSION: 8.5.8
  DOTNET_VERSION: "10.0.x"

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "MassTransit.sln"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "**/build.yml"
    branches:
      - "**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "MassTransit.sln"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "**/build.yml"
  workflow_dispatch:

# ---------------------------------------------------------------------------
# Reusable anchors
# ---------------------------------------------------------------------------
# GitHub Actions doesn't support YAML anchors, so we use a composite approach
# with consistent step naming and a shared dotnet-version env var.

jobs:
  # ==========================================================================
  # Build
  # ==========================================================================
  compile:
    name: Build
    timeout-minutes: 15
    strategy:
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore

  # ==========================================================================
  # Unit Tests
  # ==========================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Core Tests
        run: dotnet test -c Release -f net10.0 --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.Tests
      - name: Abstractions Tests
        run: dotnet test -c Release -f net10.0 --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.Abstractions.Tests

  # ==========================================================================
  # Transport Tests
  # ==========================================================================
  test-rabbitmq:
    name: "Transport: RabbitMQ"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: docker build -t masstransit-rabbitmq-test -f Dockerfile.rabbitmq .
        working-directory: tests/MassTransit.RabbitMqTransport.Tests
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.RabbitMqTransport.Tests

  test-sql-transport:
    name: "Transport: SQL"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: false
    services:
      mssql:
        image: mcr.microsoft.com/azure-sql-edge
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: "Password12!"
        ports:
          - 1433:1433
      postgres:
        image: postgres:14.7
        env:
          POSTGRES_PASSWORD: "Password12!"
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter "Category!=Flaky&Category!=Integration"
        working-directory: tests/MassTransit.SqlTransport.Tests

  test-azure-service-bus:
    name: "Transport: Azure Service Bus"
    if: false # disabled — too flaky
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        env:
          MT_ASB_KEYVALUE: ${{ secrets.AZURE_SERVICEBUS }}
          MT_AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE }}
        working-directory: tests/MassTransit.Azure.ServiceBus.Core.Tests

  # ==========================================================================
  # Persistence / Storage Tests
  # ==========================================================================
  test-azure-table:
    name: "Storage: Azure Table"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: docker compose -f docker-compose.yml up -d
        working-directory: tests/MassTransit.Azure.Table.Tests
      - run: dotnet test -c Release --logger GitHubActions --filter "Category!=Flaky&Category!=Integration"
        env:
          MT_AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE }}
        working-directory: tests/MassTransit.Azure.Table.Tests
      - run: docker compose -f docker-compose.yml down
        working-directory: tests/MassTransit.Azure.Table.Tests
        if: always()

  test-cosmosdb:
    name: "Storage: CosmosDB"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') && github.repository == 'MassTransit/MassTransit'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter "Category!=Flaky&Category!=Integration"
        env:
          MT_COSMOS_ENDPOINT: ${{ secrets.AZURE_COSMOSENDPOINT }}
          MT_COSMOS_KEY: ${{ secrets.AZURE_COSMOSKEY }}
        working-directory: tests/MassTransit.Azure.Cosmos.Tests

  test-dapper:
    name: "Storage: Dapper"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: false
    services:
      mssql:
        image: mcr.microsoft.com/azure-sql-edge
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: "Password12!"
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter "Category!=Flaky&Category!=Integration"
        working-directory: tests/MassTransit.DapperIntegration.Tests

  test-entity-framework-core:
    name: "Storage: Entity Framework Core"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: false
    services:
      mssql:
        image: mcr.microsoft.com/azure-sql-edge
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: "Password12!"
        ports:
          - 1433:1433
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: "Password12!"
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: EF Core Tests
        run: dotnet test -c Release -f net10.0 --logger GitHubActions --filter "Category!=Flaky&Category!=Integration"
        working-directory: tests/MassTransit.EntityFrameworkCoreIntegration.Tests

  test-mongodb:
    name: "Storage: MongoDB"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: docker compose -f docker-compose.yml up -d
        working-directory: tests/MassTransit.MongoDbIntegration.Tests
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.MongoDbIntegration.Tests
      - run: docker compose -f docker-compose.yml down
        working-directory: tests/MassTransit.MongoDbIntegration.Tests
        if: always()

  test-redis:
    name: "Storage: Redis"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis
        ports:
          - "6379:6379"
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.RedisIntegration.Tests

  test-valkey:
    name: "Storage: Valkey"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      valkey:
        image: valkey/valkey:8
        ports:
          - "6379:6379"
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.RedisIntegration.Tests

  # ==========================================================================
  # Scheduler Tests
  # ==========================================================================
  test-hangfire:
    name: "Scheduler: Hangfire"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.HangfireIntegration.Tests

  test-quartz:
    name: "Scheduler: Quartz"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.QuartzIntegration.Tests

  # ==========================================================================
  # Rider Tests
  # ==========================================================================
  test-eventhub:
    name: "Rider: EventHub"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: docker compose -f docker-compose.yml up -d
        working-directory: tests/MassTransit.EventHubIntegration.Tests
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        env:
          MT_EH_NAMESPACE: ${{ secrets.AZURE_EVENTHUB }}
          MT_AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE }}
        working-directory: tests/MassTransit.EventHubIntegration.Tests
      - run: docker compose -f docker-compose.yml down
        working-directory: tests/MassTransit.EventHubIntegration.Tests
        if: always()

  test-kafka:
    name: "Rider: Kafka"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: docker compose -f docker-compose.yml up -d
        working-directory: tests/MassTransit.KafkaIntegration.Tests
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.KafkaIntegration.Tests
      - run: docker compose -f docker-compose.yml down
        working-directory: tests/MassTransit.KafkaIntegration.Tests
        if: always()

  # ==========================================================================
  # Other Tests
  # ==========================================================================
  test-signalr:
    name: SignalR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test -c Release --logger GitHubActions --filter Category!=Flaky
        working-directory: tests/MassTransit.SignalR.Tests

  # ==========================================================================
  # Version Calculation
  # ==========================================================================
  calc-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    needs:
      - compile
      - test-unit
      # - test-azure-service-bus  # disabled
      - test-rabbitmq
      - test-sql-transport
      - test-azure-table
      - test-cosmosdb
      - test-dapper
      - test-entity-framework-core
      - test-mongodb
      - test-redis
      - test-valkey
      - test-hangfire
      - test-quartz
      # - test-eventhub  # disabled
      - test-kafka
      - test-signalr
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.ref }}" = 'refs/heads/master' ]; then
            echo "version=${MASSTRANSIT_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "version=${MASSTRANSIT_VERSION}-develop.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

  # ==========================================================================
  # Publish
  # ==========================================================================
  publish:
    name: Publish NuGet Packages
    runs-on: windows-latest
    timeout-minutes: 60
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') && github.repository == 'MassTransit/MassTransit' && success()
    needs: calc-version
    env:
      DOTNET_INSTALL_DIR: D:\dotnet
      NUGET_PACKAGES: D:\.nuget\packages
    steps:
      - name: Version Check
        run: echo "${{ needs.calc-version.outputs.version }}"

      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build & Pack
        run: |
          dotnet build -c Release -p:Version=${{ needs.calc-version.outputs.version }}
          dotnet pack --no-build -c Release -p:PackageVersion=${{ needs.calc-version.outputs.version }} -o ./artifacts

      - name: Push to NuGet
        working-directory: artifacts
        run: dotnet nuget push * -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }} --skip-duplicate --no-symbols
